version: '3.8'
services:
  web:
    image: my-web:latest
    privileged: true
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    build:
      context: .
      dockerfile_inline: |
        FROM node:latest
        WORKDIR relative/path
        RUN npm install foo
        EXPOSE 99999
        HEALTHCHECK CMD curl -f http://localhost/ || exit 1
        HEALTHCHECK CMD curl -f http://localhost/api || exit 1
  db:
    image: postgres:latest
    environment:
      - POSTGRES_PASSWORD=secret
