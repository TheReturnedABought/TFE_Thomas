version: "3.8"
services:
  web:
    image: nginx:latest
    environment:
      API_KEY: abc123
      DB_PASSWORD: supersecret
    deploy:
      mode: replicated
    privileged: true
  
  worker:
    image: myworker
    environment:
      SECRET_TOKEN: tokenvalue
    ports:
      - "0.0.0.0:22:22"
    privileged: true
