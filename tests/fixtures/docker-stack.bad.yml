version: "3.8"
services:
  web:
    image: nginx:latest
    environment:
      API_KEY: abc123
      DB_PASSWORD: supersecret
    deploy:
      mode: replicated
      endpoint_mode: dnsrr
      update_config:
        order: stop-first
      restart_policy:
        delay: 0s
    privileged: true
    volumes:
      - /host/path:/container/path
  
  worker:
    image: myworker
    environment:
      SECRET_TOKEN: tokenvalue
    ports:
      - "0.0.0.0:22:22"
    privileged: true
