version: '3.8'
services:
  web:
    image: ${IMAGE_NAME:-my-web}:${IMAGE_TAG:-latest}
    user: ${USER_ID:-1000}:${GROUP_ID:-1000}
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 50M
