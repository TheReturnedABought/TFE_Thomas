version: '3.8'
services:
  web:
    image: my-web:1.0.0@sha256:1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef
    user: "1000:1000"
    ports:
      - "127.0.0.1:8080:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
