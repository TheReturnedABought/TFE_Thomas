version: '3.8'
services:
  web:
    image: my-web:1.0.0@sha256:1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef
    user: "1000:1000"
    ports:
      - "127.0.0.1:8080:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    volumes:
      - ./data:/app/data:ro
    read_only: true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - custom_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - db
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 50M

networks:
  custom_net:
    driver: bridge
