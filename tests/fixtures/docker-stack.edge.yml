version: '3.8'
services:
  web:
    image: "my-web:1.0.0@sha256:1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"
    deploy:
      mode: global
      placement:
        constraints:
          - "node.role==manager"
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
