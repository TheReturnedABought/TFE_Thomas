version: "3.8"
services:
  web:
    image: nginx:latest
    ports:
      - "0.0.0.0:80:80"
      - "22:22"
    privileged: true
    volumes:
      - ./html:/usr/share/nginx/html
  api:
    image: myapp
    environment:
      JWT_SECRET: hardcodedvalue
      DB_PASSWORD: letmein
  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: supersecret
  cache:
    image: redis:latest
    ports:
      - "6379:6379"
    privileged: true
