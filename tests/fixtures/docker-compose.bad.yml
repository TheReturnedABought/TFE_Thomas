version: "3.8"
services:
  web:
    image: nginx:latest
    container_name: forced_name
    network_mode: "host"
    pid: "host"
    ipc: "host"
    mac_address: "02:42:ac:11:00:02"
    dns:
      - 8.8.8.8
    cap_add:
      - ALL
      - SYS_ADMIN
    ports:
      - "0.0.0.0:80:80"
      - "22:22"
    privileged: true
    volumes:
      - ./html:/usr/share/nginx/html
  api:
    image: myapp
    environment:
      JWT_SECRET: hardcodedvalue
      DB_PASSWORD: letmein
  db:
    image: postgres
    environment:
      POSTGRES_PASSWORD: supersecret
  cache:
    image: redis:latest
    ports:
      - "6379:6379"
    privileged: true
