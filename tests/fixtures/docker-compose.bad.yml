version: '3.8'
services:
  web:
    image: my-web:latest
    privileged: true
    user: root
    ports:
      - "0.0.0.0:80:80"
      - "443:443"
    environment:
      - DB_PASSWORD=supersecret
      - AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE
    volumes:
      - /:/host_root
      - /etc:/host_etc
      - /var/run/docker.sock:/var/run/docker.sock
      - ./.env:/app/.env
    cap_add:
      - ALL
    build:
      context: .
      dockerfile_inline: |
        FROM node:latest
        WORKDIR relative/path
        RUN npm install foo
        EXPOSE 99999
        HEALTHCHECK CMD curl -f http://localhost/ || exit 1
        HEALTHCHECK CMD curl -f http://localhost/api || exit 1
